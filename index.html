```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fable SMP</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0b0b0b;
color:white;
overflow-x:hidden;
}

/* animated background */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 20%, rgba(255,0,0,0.15), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(255,0,0,0.15), transparent 40%);
animation:bgmove 10s infinite alternate;
z-index:-1;
}

@keyframes bgmove{
0%{transform:scale(1)}
100%{transform:scale(1.2)}
}

/* navbar */

nav{
display:flex;
justify-content:center;
gap:30px;
background:#050505;
padding:15px;
border-bottom:2px solid #ff1a1a;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
color:#ff2b2b;
}

/* header */

header{
text-align:center;
padding:60px 20px;
font-size:48px;
font-weight:bold;
color:#ff2b2b;
text-shadow:0 0 20px #ff0000;
}

/* container */

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:#111;
border-radius:8px;
padding:30px;
margin-top:20px;
border:2px solid #1a1a1a;
box-shadow:0 0 20px rgba(255,0,0,0.25);
}

h2{
margin-top:0;
}

/* server status */

.status{
font-size:22px;
margin-top:10px;
}

.players{
font-size:20px;
margin-top:5px;
color:#ff4444;
}

button{
margin-top:15px;
padding:10px 20px;
background:#ff1a1a;
border:none;
border-radius:5px;
color:white;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#cc0000;
}

/* store items */

.store-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.store-item{
background:#181818;
padding:20px;
border-radius:6px;
border:1px solid #333;
}

/* staff */

.staff-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:20px;
text-align:center;
}

.staff img{
width:80px;
height:80px;
border-radius:6px;
}

/* dynmap */

iframe{
width:100%;
height:500px;
border:none;
border-radius:6px;
}

footer{
text-align:center;
padding:20px;
margin-top:40px;
color:#777;
}

</style>
</head>

<body>

<nav>
<a href="#home">Home</a>
<a href="#store">Store</a>
<a href="#staff">Staff</a>
<a href="#map">Map</a>
</nav>

<header>
FABLE SMP
</header>

<div class="container">

<div class="card" id="home">
<h2>Server Status</h2>

<div class="status" id="status">Checking...</div>
<div class="players" id="players"></div>

<button onclick="copyIP()">Copy Server IP</button>
</div>

<div class="card" id="store">
<h2>Store / Donations</h2>

<div class="store-grid">

<div class="store-item">
<h3>VIP Rank</h3>
<p>$5</p>
<button onclick="window.open('https://yourstorelink')">Buy</button>
</div>

<div class="store-item">
<h3>MVP Rank</h3>
<p>$10</p>
<button onclick="window.open('https://yourstorelink')">Buy</button>
</div>

<div class="store-item">
<h3>Coins Pack</h3>
<p>$3</p>
<button onclick="window.open('https://yourstorelink')">Buy</button>
</div>

</div>
</div>

<div class="card" id="staff">
<h2>Staff</h2>

<div class="staff-grid">

<div class="staff">
<img src="https://minotar.net/avatar/Owner/100">
<p>Owner</p>
</div>

<div class="staff">
<img src="https://minotar.net/avatar/Admin/100">
<p>Admin</p>
</div>

<div class="staff">
<img src="https://minotar.net/avatar/Moderator/100">
<p>Moderator</p>
</div>

</div>
</div>

<div class="card" id="map">
<h2>Live Map</h2>

<iframe src="https://yourserver.com:8123"></iframe>

</div>

</div>

<footer>
© 2026 Fable SMP
</footer>

<script>

const serverIP = "play.fablesmp.net"

function copyIP(){
navigator.clipboard.writeText(serverIP)
alert("Server IP copied!")
}

fetch("https://api.mcsrvstat.us/2/" + serverIP)
.then(res => res.json())
.then(data => {

if(data.online){

document.getElementById("status").innerHTML="🟢 Server Online"
document.getElementById("players").innerHTML="Players: " + data.players.online + "/" + data.players.max

}else{

document.getElementById("status").innerHTML="🔴 Server Offline"

}

})

</script>

</body>
</html>
```
