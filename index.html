<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fable Loader</title>

<style>

body{
margin:0;
background:#050814;
overflow:hidden;
font-family:sans-serif;
}

/* splash screen */
#loader{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(180deg,#050814,#02040a);
}

/* logo */
.logo{
font-size:110px;
font-weight:700;

background:linear-gradient(180deg,#4f7cff,#1a3b80);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:logoIntro 2.6s ease forwards;
}

/* animation */
@keyframes logoIntro{

0%{
opacity:0;
transform:scale(.6) rotate(0deg);
}

40%{
opacity:1;
transform:scale(1.1) rotate(720deg);
}

70%{
transform:scale(1.4) rotate(1080deg);
}

100%{
opacity:0;
transform:scale(5) rotate(1440deg);
}

}

</style>
</head>

<body>

<div id="loader">
<div class="logo">F</div>
</div>

</body>
</html>
