<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logo Splash Animation</title>
<style>
  /* Fullscreen splash container */
  #splash {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #111; /* Background color during splash */
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    overflow: hidden;
  }

  /* Logo style */
  #splash img {
    width: 200px;
    opacity: 0;
    transform: rotate(0deg) scale(0.5);
    animation: spinFade 2s forwards;
  }

  /* Spin + fade-in animation */
  @keyframes spinFade {
    0% {
      opacity: 0;
      transform: rotate(0deg) scale(0.5);
    }
    50% {
      opacity: 1;
      transform: rotate(180deg) scale(1.2);
    }
    100% {
      opacity: 1;
      transform: rotate(360deg) scale(1);
    }
  }

  /* Hide main content initially */
  #main {
    display: none;
  }
</style>
</head>
<body>

<!-- Splash screen -->
<div id="splash">
  <img src="logo.png" alt="Logo">
</div>

<!-- Main website content -->
<div id="main">
  <h1>Welcome to My Website</h1>
  <p>This is the main page content.</p>
</div>

<script>
  // Remove splash after animation finishes
  window.addEventListener('load', () => {
    const splash = document.getElementById('splash');
    const main = document.getElementById('main');

    // Wait for animation to finish (2s here)
    setTimeout(() => {
      splash.style.display = 'none';
      main.style.display = 'block';
    }, 2000);
  });
</script>

</body>
</html>
