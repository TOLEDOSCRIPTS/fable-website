<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letter Splash</title>
<style>
  /* Fullscreen splash */
  #splash {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #1e3c72, #2a5298); /* Blue gradient */
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  }

  /* Logo letter */
  #splash-letter {
    font-size: 100px;
    font-weight: bold;
    color: white;
    opacity: 1;
    animation: spinFadeOut 3s forwards;
  }

  /* Spin multiple times then scale/fade out */
  @keyframes spinFadeOut {
    0% {
      transform: rotate(0deg) scale(1);
      opacity: 1;
    }
    50% {
      transform: rotate(720deg) scale(1.1); /* 2 spins halfway through */
      opacity: 1;
    }
    80% {
      transform: rotate(1080deg) scale(2); /* 3 spins, start zoom */
      opacity: 0.5;
    }
    100% {
      transform: rotate(1440deg) scale(5); /* final spin + big zoom */
      opacity: 0;
    }
  }

  /* Hide main content initially */
  #main {
    display: none;
    padding: 50px;
    text-align: center;
    font-family: sans-serif;
  }
</style>
</head>
<body>

<!-- Splash -->
<div id="splash">
  <div id="splash-letter">A</div> <!-- replace "A" with your letter -->
</div>

<!-- Main content -->
<div id="main">
  <h1>Welcome to My Website</h1>
  <p>This is the main page content after the splash.</p>
</div>

<script>
  // Remove splash after animation finishes
  window.addEventListener('load', () => {
    const splash = document.getElementById('splash');
    const main = document.getElementById('main');

    // Match duration of CSS animation (3s)
    setTimeout(() => {
      splash.style.display = 'none';
      main.style.display = 'block';
    }, 3000);
  });
</script>

</body>
</html>
