```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fable SMP</title>

<style>

body{
margin:0;
font-family:Verdana;
background:#0b0b0b;
color:white;
overflow-x:hidden;
}

/* LOADING SCREEN */

#loader{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
}

.spinner{
width:70px;
height:70px;
border:8px solid #222;
border-top:8px solid red;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

/* BACKGROUND */

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
linear-gradient(45deg,#111 25%,transparent 25%),
linear-gradient(-45deg,#111 25%,transparent 25%),
linear-gradient(45deg,transparent 75%,#111 75%),
linear-gradient(-45deg,transparent 75%,#111 75%);
background-size:40px 40px;
animation:movebg 6s linear infinite;
z-index:-1;
}

@keyframes movebg{
0%{background-position:0 0}
100%{background-position:40px 40px}
}

/* NAVBAR */

nav{
background:#050505;
border-bottom:2px solid red;
display:flex;
justify-content:center;
gap:30px;
padding:15px;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
color:red;
}

/* HEADER */

header{
text-align:center;
font-size:50px;
padding:50px;
color:red;
text-shadow:0 0 20px red;
}

/* CARDS */

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:#121212;
border:2px solid #222;
padding:30px;
margin-top:25px;
border-radius:8px;
box-shadow:0 0 20px rgba(255,0,0,0.2);
}

/* PLAYER GRID */

.players{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
}

.player{
background:#1c1c1c;
padding:10px;
border-radius:6px;
text-align:center;
}

/* STAFF LOGIN */

#loginPanel{
display:none;
background:#111;
padding:20px;
margin-top:20px;
border-radius:6px;
}

input{
padding:10px;
margin-top:10px;
width:100%;
background:#1c1c1c;
border:none;
color:white;
}

button{
margin-top:15px;
padding:10px 20px;
background:red;
border:none;
color:white;
cursor:pointer;
}

button:hover{
background:#cc0000;
}

iframe{
width:100%;
height:600px;
border:none;
}

</style>
</head>

<body>

<div id="loader">
<div class="spinner"></div>
<p>Loading Server...</p>
</div>

<div class="bg"></div>

<nav>
<a href="#status">Server</a>
<a href="#players">Players</a>
<a href="#store">Store</a>
<a href="#staff">Staff</a>
<a href="#login">Staff Login</a>
</nav>

<header>FABLE SMP</header>

<div class="container">

<div class="card" id="status">
<h2>Server Status</h2>
<p id="statusText">Checking...</p>
<p id="motd"></p>
<p id="java"></p>
<p id="bedrock"></p>
</div>

<div class="card" id="players">
<h2>Online Players</h2>
<div class="players" id="playerList"></div>
</div>

<div class="card" id="store">
<h2>Server Store</h2>
<iframe src="https://YOURTEBEXSTORE.tebex.io"></iframe>
</div>

<div class="card" id="staff">
<h2>Staff</h2>
<div class="players">
<div class="player">Owner</div>
<div class="player">Admin</div>
<div class="player">Moderator</div>
</div>
</div>

<div class="card" id="login">
<h2>Staff Login</h2>

<button onclick="toggleLogin()">Open Login</button>

<div id="loginPanel">
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="loginResult"></p>
</div>

</div>

</div>

<script>

const serverIP = "play.fablesmp.net"

fetch("https://api.mcsrvstat.us/2/"+serverIP)
.then(res=>res.json())
.then(data=>{

if(data.online){

document.getElementById("statusText").innerHTML="🟢 Online"

document.getElementById("motd").innerHTML="MOTD: "+data.motd.clean

document.getElementById("java").innerHTML="Java Players: "+data.players.online+"/"+data.players.max

if(data.players.list){

let list=""

data.players.list.forEach(p=>{
list+=`<div class="player">${p}</div>`
})

document.getElementById("playerList").innerHTML=list

}

if(data.bedrock){

document.getElementById("bedrock").innerHTML="Bedrock Port: "+data.bedrock.port

}

}else{

document.getElementById("statusText").innerHTML="🔴 Offline"

}

})

function toggleLogin(){
const panel=document.getElementById("loginPanel")
panel.style.display=panel.style.display==="block"?"none":"block"
}

function login(){

const user=document.getElementById("user").value
const pass=document.getElementById("pass").value

if(user==="admin" && pass==="password"){
document.getElementById("loginResult").innerHTML="Access granted"
}else{
document.getElementById("loginResult").innerHTML="Invalid login"
}

}

window.onload=()=>{
setTimeout(()=>{
document.getElementById("loader").style.display="none"
},1200)
}

</script>

</body>
</html>
```
